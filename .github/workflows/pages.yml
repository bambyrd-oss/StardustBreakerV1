# Builds the game and publishes it to GitHub Pages.
# The harness gates the deploy — if the tests fail, nothing ships.
#
# No manual setup needed: the build job enables Pages itself
# (actions/configure-pages with enablement: true).
name: build & deploy

on:
  push:
    branches: [main, claude/new-session-qlphac]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: pip install pillow
      - name: Build index.html and run the harness
        run: python3 src/build.py
      - name: Enable + configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with: { path: . }

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
